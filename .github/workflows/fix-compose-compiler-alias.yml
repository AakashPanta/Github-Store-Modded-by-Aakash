name: Fix Compose Compiler Alias

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-compose-compiler-alias:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove invalid Compose compiler alias
        shell: bash
        run: |
          set -e

          echo "Removing invalid Compose compiler plugin alias..."

          find . -name "*.gradle.kts" -type f -print0 | while IFS= read -r -d '' file; do
            sed -i '/alias(libs.plugins.compose.compiler)/d' "$file"
            sed -i '/libs.plugins.compose.compiler/d' "$file"
            sed -i '/org.jetbrains.kotlin.plugin.compose/d' "$file"
          done

          if [ -f gradle/libs.versions.toml ]; then
            sed -i '/compose-compiler/d' gradle/libs.versions.toml
            sed -i '/composeCompiler/d' gradle/libs.versions.toml
            sed -i '/kotlin-compose/d' gradle/libs.versions.toml
            sed -i '/kotlinCompose/d' gradle/libs.versions.toml
            sed -i '/org.jetbrains.kotlin.plugin.compose/d' gradle/libs.versions.toml
          fi

      - name: Commit and push fix
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes needed."
          else
            git add .
            git commit -m "Fix invalid Compose compiler alias"
            git push
          fi