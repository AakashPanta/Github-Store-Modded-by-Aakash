name: Professional Project Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  professional-project-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix entire project professionally
        shell: bash
        run: |
          set -e

          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path(".")

          def read(p):
              return p.read_text(encoding="utf-8")

          def write(p, text):
              p.write_text(text, encoding="utf-8")

          def insert_inside_block(text, block_name, insertion):
              idx = text.find(block_name + " {")
              if idx == -1:
                  return text

              brace = text.find("{", idx)
              if brace == -1:
                  return text

              return text[:brace + 1] + "\n" + insertion + text[brace + 1:]

          def append_inside_android_block(text, insertion):
              idx = text.find("android {")
              if idx == -1:
                  return text

              brace = text.find("{", idx)
              depth = 0
              end = -1

              for i in range(brace, len(text)):
                  if text[i] == "{":
                      depth += 1
                  elif text[i] == "}":
                      depth -= 1
                      if depth == 0:
                          end = i
                          break

              if end == -1:
                  return text

              return text[:end] + "\n" + insertion + "\n" + text[end:]

          gradle_files = list(root.rglob("*.gradle.kts"))

          for p in gradle_files:
              text = read(p)

              # Remove invalid Compose compiler alias/plugin references
              lines = []
              for line in text.splitlines():
                  if "libs.plugins.compose.compiler" in line:
                      continue
                  if "org.jetbrains.kotlin.plugin.compose" in line:
                      continue
                  if "compose.compiler" in line:
                      continue
                  lines.append(line)
              text = "\n".join(lines) + "\n"

              # Add androidTarget() to KMP Android modules
              is_kmp = (
                  'kotlin("multiplatform")' in text
                  or 'id("org.jetbrains.kotlin.multiplatform")' in text
                  or "libs.plugins.kotlin.multiplatform" in text
              )

              has_android_plugin = (
                  'com.android.library' in text
                  or 'com.android.application' in text
                  or 'libs.plugins.android.library' in text
                  or 'libs.plugins.android.application' in text
              )

              if is_kmp and has_android_plugin and "androidTarget()" not in text:
                  text = insert_inside_block(text, "kotlin", "    androidTarget()")

              # Add namespace if missing
              if "android {" in text and "namespace =" not in text:
                  module = p.parent.name.replace("-", "_").lower()
                  namespace = f"com.mrrobot.releasehub.{module}"
                  text = insert_inside_block(text, "android", f'    namespace = "{namespace}"')

              # Add compileSdk if missing
              if "android {" in text and "compileSdk" not in text:
                  text = insert_inside_block(text, "android", "    compileSdk = 35")

              # Add minSdk if defaultConfig exists but minSdk missing
              if "defaultConfig {" in text and "minSdk" not in text:
                  text = insert_inside_block(text, "defaultConfig", "        minSdk = 24")

              # Add Java 17 compile options if missing
              if "android {" in text and "sourceCompatibility = JavaVersion.VERSION_17" not in text:
                  compile_options = """    compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }"""
                  text = append_inside_android_block(text, compile_options)

              write(p, text)

          # Fix androidApp broken Compose dependency accessors
          android_app = Path("androidApp/build.gradle.kts")
          if android_app.exists():
              text = read(android_app)
              replacements = {
                  "implementation(compose.ui)": 'implementation("androidx.compose.ui:ui")',
                  "implementation(compose.material3)": 'implementation("androidx.compose.material3:material3")',
                  "implementation(compose.foundation)": 'implementation("androidx.compose.foundation:foundation")',
                  "implementation(compose.runtime)": 'implementation("androidx.compose.runtime:runtime")',
              }
              for old, new in replacements.items():
                  text = text.replace(old, new)
              write(android_app, text)

          # Clean libs.versions.toml
          toml = Path("gradle/libs.versions.toml")
          if toml.exists():
              text = read(toml)
              cleaned = []
              for line in text.splitlines():
                  bad = (
                      "compose-compiler" in line
                      or "composeCompiler" in line
                      or "kotlin-compose" in line
                      or "kotlinCompose" in line
                      or "org.jetbrains.kotlin.plugin.compose" in line
                  )
                  if not bad:
                      cleaned.append(line)
              write(toml, "\n".join(cleaned) + "\n")

          # Stabilize gradle.properties
          props = Path("gradle.properties")
          existing = read(props) if props.exists() else ""

          required = {
              "org.gradle.jvmargs": "-Xmx4g -Dfile.encoding=UTF-8",
              "kotlin.code.style": "official",
              "android.useAndroidX": "true",
              "kotlin.mpp.androidSourceSetLayoutVersion": "2",
              "kotlin.mpp.androidGradlePluginCompatibility.nowarn": "true",
          }

          lines = existing.splitlines()
          keys = {line.split("=", 1)[0].strip() for line in lines if "=" in line}

          for key, value in required.items():
              if key not in keys:
                  lines.append(f"{key}={value}")

          write(props, "\n".join(lines).strip() + "\n")
          PY

      - name: Commit and push professional fixes
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes needed."
          else
            git add .
            git commit -m "Professionally stabilize Android KMP project"
            git push
          fi