name: Build APK Professional Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Kotlin Compose versions
        shell: bash
        run: |
          set -e

          echo "Force Kotlin 2.0.20 because Compose 1.8.0 requires Kotlin 2.0+"

          find . -name "*.gradle.kts" -type f -exec sed -i 's/1\.9\.24/2.0.20/g' {} \;
          find . -name "*.toml" -type f -exec sed -i 's/1\.9\.24/2.0.20/g' {} \;

          find . -name "*.gradle.kts" -type f -exec sed -i '/libs.plugins.compose.compiler/d' {} \;
          find . -name "*.gradle.kts" -type f -exec sed -i '/alias(libs.plugins.compose.compiler)/d' {} \;

      - name: Fix composeApp androidTarget
        shell: bash
        run: |
          set -e

          FILE="composeApp/build.gradle.kts"

          if [ -f "$FILE" ]; then
            if grep -q "kotlin {" "$FILE" && ! grep -q "androidTarget()" "$FILE"; then
              sed -i '/kotlin {/a\    androidTarget()' "$FILE"
            fi
          fi

      - name: Fix gradle properties
        shell: bash
        run: |
          set -e

          touch gradle.properties

          grep -q '^android.useAndroidX=' gradle.properties || echo 'android.useAndroidX=true' >> gradle.properties
          grep -q '^kotlin.code.style=' gradle.properties || echo 'kotlin.code.style=official' >> gradle.properties
          grep -q '^kotlin.mpp.androidSourceSetLayoutVersion=' gradle.properties || echo 'kotlin.mpp.androidSourceSetLayoutVersion=2' >> gradle.properties
          grep -q '^kotlin.mpp.androidGradlePluginCompatibility.nowarn=' gradle.properties || echo 'kotlin.mpp.androidGradlePluginCompatibility.nowarn=true' >> gradle.properties

      - name: Show fixed files
        shell: bash
        run: |
          echo "===== build.gradle.kts ====="
          sed -n '1,80p' build.gradle.kts || true

          echo "===== composeApp/build.gradle.kts ====="
          sed -n '1,120p' composeApp/build.gradle.kts || true

          echo "===== gradle/libs.versions.toml ====="
          sed -n '1,120p' gradle/libs.versions.toml || true

      - name: Clean build
        run: gradle clean --stacktrace

      - name: Build APK
        run: gradle :androidApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk