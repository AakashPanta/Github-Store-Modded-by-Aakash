name: Build APK Emergency Stable

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        shell: bash
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Repair project files
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path

          def read(path):
              p = Path(path)
              return p.read_text() if p.exists() else ""

          def write(path, text):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(text)

          # Force Kotlin 2.0.20
          for p in list(Path(".").rglob("*.gradle.kts")) + list(Path(".").rglob("*.toml")):
              text = p.read_text()
              text = text.replace("1.9.24", "2.0.20")
              p.write_text(text)

          # gradle.properties
          props = Path("gradle.properties")
          lines = props.read_text().splitlines() if props.exists() else []
          required = {
              "android.useAndroidX": "true",
              "kotlin.code.style": "official",
              "kotlin.mpp.androidSourceSetLayoutVersion": "2",
              "kotlin.mpp.androidGradlePluginCompatibility.nowarn": "true",
              "android.suppressUnsupportedCompileSdk": "35",
          }
          existing = {line.split("=", 1)[0].strip() for line in lines if "=" in line}
          for k, v in required.items():
              if k not in existing:
                  lines.append(f"{k}={v}")
          props.write_text("\n".join(lines) + "\n")

          def add_plugin(path, plugin_line):
              text = read(path)
              if not text or plugin_line in text:
                  return
              if "plugins {" in text:
                  text = text.replace("plugins {", "plugins {\n    " + plugin_line, 1)
                  write(path, text)

          add_plugin("build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose") version "2.0.20" apply false')
          add_plugin("androidApp/build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose")')
          add_plugin("composeApp/build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose")')

          # composeApp android target
          text = read("composeApp/build.gradle.kts")
          if text and "kotlin {" in text and "androidTarget()" not in text:
              text = text.replace("kotlin {", "kotlin {\n    androidTarget()", 1)
              write("composeApp/build.gradle.kts", text)

          # androidApp dependencies
          text = read("androidApp/build.gradle.kts")
          if text:
              if "dependencies {" not in text:
                  text += "\n\ndependencies {\n}\n"

              deps = [
                  'implementation(project(":composeApp"))',
                  'implementation(project(":core-model"))',
                  'implementation(project(":local-store"))',
                  'implementation(project(":sdk-github"))',
                  'implementation("io.ktor:ktor-client-core:2.3.12")',
                  'implementation("io.ktor:ktor-client-okhttp:2.3.12")',
                  'implementation("io.ktor:ktor-client-content-negotiation:2.3.12")',
                  'implementation("io.ktor:ktor-serialization-kotlinx-json:2.3.12")',
                  'implementation("org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3")',
              ]

              for dep in deps:
                  if dep not in text:
                      text = text.replace("dependencies {", "dependencies {\n    " + dep, 1)

              write("androidApp/build.gradle.kts", text)

          # Remove duplicate GitHub HTTP client
          sdk_dir = Path("sdk-github/src/commonMain/kotlin/com/punkcrypto/releasehub/sdk/github")
          sdk_dir.mkdir(parents=True, exist_ok=True)

          for file in Path("sdk-github/src").rglob("*.kt"):
              if file.name != "GitHubHttpClientFactory.kt":
                  content = file.read_text()
                  if "fun createGitHubHttpClient" in content:
                      file.unlink()

          write(sdk_dir / "GitHubHttpClientFactory.kt", '''package com.punkcrypto.releasehub.sdk.github

          import io.ktor.client.HttpClient
          import io.ktor.client.plugins.contentnegotiation.ContentNegotiation
          import io.ktor.client.plugins.defaultRequest
          import io.ktor.client.request.header
          import io.ktor.http.HttpHeaders
          import io.ktor.serialization.kotlinx.json.json
          import kotlinx.serialization.json.Json

          fun createGitHubHttpClient(): HttpClient {
              return HttpClient {
                  install(ContentNegotiation) {
                      json(
                          Json {
                              ignoreUnknownKeys = true
                              isLenient = true
                              explicitNulls = false
                          }
                      )
                  }

                  defaultRequest {
                      header(HttpHeaders.Accept, "application/vnd.github+json")
                      header("X-GitHub-Api-Version", "2022-11-28")
                      header(HttpHeaders.UserAgent, "ReleaseHubMvp")
                  }
              }
          }
          '''.replace("          ", ""))
          PY

      - name: Show patched Android build file
        shell: bash
        run: |
          sed -n '1,160p' androidApp/build.gradle.kts || true

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./gradlew ]; then
            ./gradlew clean :androidApp:assembleDebug --stacktrace
          else
            gradle clean :androidApp:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk