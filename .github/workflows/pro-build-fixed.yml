name: Build APK Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Repair project
        shell: bash
        run: |
          set -euo pipefail

          echo "Fix Kotlin version..."
          find . -name "*.gradle.kts" -type f -exec sed -i 's/1\.9\.24/2.0.20/g' {} \;
          find . -name "*.toml" -type f -exec sed -i 's/1\.9\.24/2.0.20/g' {} \;

          echo "Fix gradle.properties..."
          touch gradle.properties
          grep -q '^android.useAndroidX=' gradle.properties || echo 'android.useAndroidX=true' >> gradle.properties
          grep -q '^kotlin.code.style=' gradle.properties || echo 'kotlin.code.style=official' >> gradle.properties
          grep -q '^kotlin.mpp.androidSourceSetLayoutVersion=' gradle.properties || echo 'kotlin.mpp.androidSourceSetLayoutVersion=2' >> gradle.properties
          grep -q '^kotlin.mpp.androidGradlePluginCompatibility.nowarn=' gradle.properties || echo 'kotlin.mpp.androidGradlePluginCompatibility.nowarn=true' >> gradle.properties
          grep -q '^android.suppressUnsupportedCompileSdk=' gradle.properties || echo 'android.suppressUnsupportedCompileSdk=35' >> gradle.properties

          echo "Patch Gradle files safely..."
          python3 <<'PY'
from pathlib import Path

def add_after_plugins(path, line):
    p = Path(path)
    if not p.exists():
        return
    text = p.read_text()
    if line in text:
        return
    text = text.replace("plugins {", "plugins {\n    " + line, 1)
    p.write_text(text)

add_after_plugins("build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose") version "2.0.20" apply false')
add_after_plugins("androidApp/build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose")')
add_after_plugins("composeApp/build.gradle.kts", 'id("org.jetbrains.kotlin.plugin.compose")')

p = Path("composeApp/build.gradle.kts")
if p.exists():
    text = p.read_text()
    if "kotlin {" in text and "androidTarget()" not in text:
        text = text.replace("kotlin {", "kotlin {\n    androidTarget()", 1)
        p.write_text(text)

p = Path("androidApp/build.gradle.kts")
if p.exists():
    text = p.read_text()
    if "dependencies {" not in text:
        text += "\n\ndependencies {\n}\n"
    deps = [
        'implementation(project(":composeApp"))',
        'implementation(project(":core-model"))',
        'implementation(project(":local-store"))',
        'implementation(project(":sdk-github"))',
    ]
    for dep in deps:
        if dep not in text:
            text = text.replace("dependencies {", "dependencies {\n    " + dep, 1)
    p.write_text(text)
PY

          echo "Fix GitHub HTTP client..."
          SDK_DIR="sdk-github/src/commonMain/kotlin/com/punkcrypto/releasehub/sdk/github"
          mkdir -p "$SDK_DIR"

          find sdk-github/src -type f -name "*.kt" \
            ! -path "$SDK_DIR/GitHubHttpClientFactory.kt" \
            -exec grep -l "fun createGitHubHttpClient" {} \; | while read -r file; do
              rm -f "$file"
          done

          cat > "$SDK_DIR/GitHubHttpClientFactory.kt" <<'EOF'
package com.punkcrypto.releasehub.sdk.github

import io.ktor.client.HttpClient
import io.ktor.client.plugins.contentnegotiation.ContentNegotiation
import io.ktor.client.plugins.defaultRequest
import io.ktor.client.request.header
import io.ktor.http.HttpHeaders
import io.ktor.serialization.kotlinx.json.json
import kotlinx.serialization.json.Json

fun createGitHubHttpClient(): HttpClient {
    return HttpClient {
        install(ContentNegotiation) {
            json(
                Json {
                    ignoreUnknownKeys = true
                    isLenient = true
                    explicitNulls = false
                }
            )
        }

        defaultRequest {
            header(HttpHeaders.Accept, "application/vnd.github+json")
            header("X-GitHub-Api-Version", "2022-11-28")
            header(HttpHeaders.UserAgent, "ReleaseHubMvp")
        }
    }
}
EOF

      - name: Show important files
        shell: bash
        run: |
          sed -n '1,160p' build.gradle.kts || true
          sed -n '1,200p' androidApp/build.gradle.kts || true
          sed -n '1,200p' composeApp/build.gradle.kts || true
          grep -R "fun createGitHubHttpClient" sdk-github/src || true

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew clean :androidApp:assembleDebug --stacktrace || gradle clean :androidApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk