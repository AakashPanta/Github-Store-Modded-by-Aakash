name: Fix Gradle Build Config

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-gradle-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix invalid Gradle plugin versions
        shell: bash
        run: |
          set -e

          echo "Fixing Gradle, Kotlin, and Compose plugin versions..."

          find . -name "*.gradle.kts" -type f -print0 | while IFS= read -r -d '' file; do
            echo "Checking $file"

            sed -i 's/id("com.android.application") version "8\.9\.0"/id("com.android.application") version "8.5.2"/g' "$file"
            sed -i 's/id("com.android.library") version "8\.9\.0"/id("com.android.library") version "8.5.2"/g' "$file"

            sed -i 's/id("org.jetbrains.kotlin.android") version "2\.1\.0"/id("org.jetbrains.kotlin.android") version "1.9.24"/g' "$file"
            sed -i 's/id("org.jetbrains.kotlin.multiplatform") version "2\.1\.0"/id("org.jetbrains.kotlin.multiplatform") version "1.9.24"/g' "$file"
            sed -i 's/id("org.jetbrains.kotlin.plugin.serialization") version "2\.1\.0"/id("org.jetbrains.kotlin.plugin.serialization") version "1.9.24"/g' "$file"

            sed -i 's/id("org.jetbrains.compose") version "1\.8\.0"/id("org.jetbrains.compose") version "1.6.11"/g' "$file"
            sed -i 's/id("org.jetbrains.kotlin.plugin.compose") version "2\.1\.0"/id("org.jetbrains.kotlin.plugin.compose") version "1.9.24"/g' "$file"
          done

      - name: Fix version catalog if present
        shell: bash
        run: |
          set -e

          if [ -f gradle/libs.versions.toml ]; then
            echo "Fixing gradle/libs.versions.toml"

            sed -i 's/agp = "8\.9\.0"/agp = "8.5.2"/g' gradle/libs.versions.toml
            sed -i 's/androidGradlePlugin = "8\.9\.0"/androidGradlePlugin = "8.5.2"/g' gradle/libs.versions.toml

            sed -i 's/kotlin = "2\.1\.0"/kotlin = "1.9.24"/g' gradle/libs.versions.toml
            sed -i 's/compose = "1\.8\.0"/compose = "1.6.11"/g' gradle/libs.versions.toml
          fi

      - name: Fix Gradle wrapper
        shell: bash
        run: |
          set -e

          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip#g' gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Commit and push fixes
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No Gradle version fixes needed."
          else
            git add .
            git commit -m "Fix Gradle build configuration"
            git push
          fi