name: Apply Compose Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project root
        id: project
        run: |
          set -e
          if [ -f "settings.gradle.kts" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "releasehub-mvp/settings.gradle.kts" ]; then
            echo "dir=releasehub-mvp" >> "$GITHUB_OUTPUT"
          else
            echo "Project root not found"
            exit 1
          fi

      - name: Verify fix source exists
        run: |
          set -e
          test -f tools/fixes/ReleaseHubApp.fixed.kt

      - name: Apply fixed ReleaseHubApp.kt
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -e
          mkdir -p composeApp/src/commonMain/kotlin/com/punkcrypto/releasehub/app
          cp ../tools/fixes/ReleaseHubApp.fixed.kt composeApp/src/commonMain/kotlin/com/punkcrypto/releasehub/app/ReleaseHubApp.kt || \
          cp tools/fixes/ReleaseHubApp.fixed.kt composeApp/src/commonMain/kotlin/com/punkcrypto/releasehub/app/ReleaseHubApp.kt

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Apply Compose UI fix"
          git push
