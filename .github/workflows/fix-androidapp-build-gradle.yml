name: Fix Kotlin Compose Plugin

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-kotlin-compose-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove invalid Kotlin Compose plugin
        shell: bash
        run: |
          set -e

          echo "Removing invalid org.jetbrains.kotlin.plugin.compose plugin..."

          find . -name "*.gradle.kts" -type f -print0 | while IFS= read -r -d '' file; do
            sed -i '/org.jetbrains.kotlin.plugin.compose/d' "$file"
          done

          if [ -f gradle/libs.versions.toml ]; then
            sed -i '/kotlin.*compose/d' gradle/libs.versions.toml
            sed -i '/composeCompiler/d' gradle/libs.versions.toml
          fi

      - name: Keep stable plugin versions
        shell: bash
        run: |
          set -e

          find . -name "*.gradle.kts" -type f -print0 | while IFS= read -r -d '' file; do
            sed -i 's/version "8\.9\.0"/version "8.5.2"/g' "$file"
            sed -i 's/version("8\.9\.0")/version("8.5.2")/g' "$file"

            sed -i 's/version "2\.1\.0"/version "1.9.24"/g' "$file"
            sed -i 's/version("2\.1\.0")/version("1.9.24")/g' "$file"

            sed -i 's/version "1\.8\.0"/version "1.6.11"/g' "$file"
            sed -i 's/version("1\.8\.0")/version("1.6.11")/g' "$file"
          done

      - name: Commit and push fix
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes needed."
          else
            git add .
            git commit -m "Remove invalid Kotlin Compose Gradle plugin"
            git push
          fi