name: Apply Ktor compatibility fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect project root
        id: project
        shell: bash
        run: |
          set -e

          if [ -f "gradle/libs.versions.toml" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "releasehub-mvp/gradle/libs.versions.toml" ]; then
            echo "dir=releasehub-mvp" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find gradle/libs.versions.toml in repo root or releasehub-mvp/"
            exit 1
          fi

      - name: Replace version catalog with compatible versions
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -e

          cat > gradle/libs.versions.toml <<'EOF'
[versions]
agp = "8.9.0"
kotlin = "2.1.0"
compose-multiplatform = "1.10.3"
androidx-core = "1.15.0"
androidx-activity = "1.10.1"
coroutines = "1.10.2"
serialization = "1.8.1"
ktor = "2.3.12"

[libraries]
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidx-core" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity" }

kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }

ktor-client-core = { module = "io.ktor:ktor-client-core", version.ref = "ktor" }
ktor-client-okhttp = { module = "io.ktor:ktor-client-okhttp", version.ref = "ktor" }
ktor-client-content-negotiation = { module = "io.ktor:ktor-client-content-negotiation", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "compose-multiplatform" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
EOF

      - name: Show updated version catalog
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          echo "===== gradle/libs.versions.toml ====="
          cat gradle/libs.versions.toml

      - name: Commit and push fix
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Fix Kotlin and Ktor compatibility"
          git push
