name: Fix App Network Error And Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Android cleartext localhost config safely
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST="androidApp/src/main/AndroidManifest.xml"
          RES_XML_DIR="androidApp/src/main/res/xml"
          NETWORK_FILE="$RES_XML_DIR/network_security_config.xml"

          if [ ! -f "$MANIFEST" ]; then
            echo "Manifest not found: $MANIFEST"
            exit 1
          fi

          mkdir -p "$RES_XML_DIR"

          cat > "$NETWORK_FILE" <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true" />
    <domain-config cleartextTrafficPermitted="true">
        <domain includeSubdomains="true">localhost</domain>
        <domain includeSubdomains="true">127.0.0.1</domain>
        <domain includeSubdomains="true">10.0.2.2</domain>
    </domain-config>
</network-security-config>
EOF

          python3 <<'PY'
from pathlib import Path
import re

manifest = Path("androidApp/src/main/AndroidManifest.xml")
text = manifest.read_text(encoding="utf-8")

match = re.search(r"<application\b([^>]*)>", text, flags=re.DOTALL)
if not match:
    raise SystemExit("No <application> tag found in AndroidManifest.xml")

attrs = match.group(1)

# Remove old duplicate/broken attributes
attrs = re.sub(r'\sandroid:usesCleartextTraffic="[^"]*"', '', attrs)
attrs = re.sub(r'\sandroid:networkSecurityConfig="[^"]*"', '', attrs)

new_tag = (
    '<application'
    + attrs
    + ' android:usesCleartextTraffic="true"'
    + ' android:networkSecurityConfig="@xml/network_security_config">'
)

text = text[:match.start()] + new_tag + text[match.end():]
manifest.write_text(text, encoding="utf-8")
PY

      - name: Show fixed files
        shell: bash
        run: |
          sed -n '1,140p' androidApp/src/main/AndroidManifest.xml
          echo ""
          sed -n '1,120p' androidApp/src/main/res/xml/network_security_config.xml

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean :androidApp:assembleDebug --stacktrace
          else
            gradle clean :androidApp:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add androidApp/src/main/AndroidManifest.xml androidApp/src/main/res/xml/network_security_config.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix Android cleartext localhost network config"
            git push
          fi