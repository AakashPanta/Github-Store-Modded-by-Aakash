
name: Fix Cleartext Localhost And Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix cleartext localhost network security error
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST="androidApp/src/main/AndroidManifest.xml"
          RES_XML_DIR="androidApp/src/main/res/xml"
          NETWORK_SECURITY_FILE="$RES_XML_DIR/network_security_config.xml"

          mkdir -p "$RES_XML_DIR"

          cat > "$NETWORK_SECURITY_FILE" <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <domain-config cleartextTrafficPermitted="true">
        <domain includeSubdomains="true">localhost</domain>
        <domain includeSubdomains="true">127.0.0.1</domain>
        <domain includeSubdomains="true">10.0.2.2</domain>
    </domain-config>
</network-security-config>
EOF

          if [ -f "$MANIFEST" ]; then
            if ! grep -q 'android:networkSecurityConfig="@xml/network_security_config"' "$MANIFEST"; then
              sed -i 's/<application /<application android:networkSecurityConfig="@xml\/network_security_config" /' "$MANIFEST"
            fi

            if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
              sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
            fi
          else
            echo "AndroidManifest.xml not found at $MANIFEST"
            exit 1
          fi

      - name: Show fixed AndroidManifest
        shell: bash
        run: |
          sed -n '1,120p' androidApp/src/main/AndroidManifest.xml
          echo ""
          sed -n '1,120p' androidApp/src/main/res/xml/network_security_config.xml

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean :androidApp:assembleDebug --stacktrace
          else
            echo "gradlew not found. Using system Gradle."
            gradle clean :androidApp:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: releasehub-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Commit fixed project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add androidApp/src/main/AndroidManifest.xml androidApp/src/main/res/xml/network_security_config.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix localhost cleartext network security config"
            git push
          fi