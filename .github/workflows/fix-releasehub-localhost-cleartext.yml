name: Fix ReleaseHub Localhost Cleartext Error

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix GitHub API HTTPS client
        shell: bash
        run: |
          set -euo pipefail

          SDK_DIR="sdk-github/src/commonMain/kotlin/com/punkcrypto/releasehub/sdk/github"
          CLIENT_FILE="$SDK_DIR/GitHubHttpClientFactory.kt"

          mkdir -p "$SDK_DIR"

          cat > "$CLIENT_FILE" <<'EOF'
          package com.punkcrypto.releasehub.sdk.github

          import io.ktor.client.HttpClient
          import io.ktor.client.plugins.contentnegotiation.ContentNegotiation
          import io.ktor.client.plugins.defaultRequest
          import io.ktor.client.request.header
          import io.ktor.http.HttpHeaders
          import io.ktor.http.URLProtocol
          import io.ktor.serialization.kotlinx.json.json
          import kotlinx.serialization.json.Json

          fun createGitHubHttpClient(): HttpClient {
              return HttpClient {
                  install(ContentNegotiation) {
                      json(
                          Json {
                              ignoreUnknownKeys = true
                              isLenient = true
                              explicitNulls = false
                          }
                      )
                  }

                  defaultRequest {
                      url {
                          protocol = URLProtocol.HTTPS
                          host = "api.github.com"
                      }

                      header(HttpHeaders.Accept, "application/vnd.github+json")
                      header("X-GitHub-Api-Version", "2022-11-28")
                      header(HttpHeaders.UserAgent, "ReleaseHubMvp")
                  }
              }
          }
          EOF

      - name: Replace localhost API calls
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \( -name "*.kt" -o -name "*.kts" \) -print0 | while IFS= read -r -d '' file; do
            sed -i \
              -e 's#http://localhost:8080##g' \
              -e 's#http://localhost:8000##g' \
              -e 's#http://localhost:3000##g' \
              -e 's#http://localhost##g' \
              -e 's#http://127.0.0.1:8080##g' \
              -e 's#http://127.0.0.1:8000##g' \
              -e 's#http://127.0.0.1:3000##g' \
              -e 's#http://127.0.0.1##g' \
              "$file"
          done

      - name: Verify no localhost HTTP remains
        shell: bash
        run: |
          set -euo pipefail

          if grep -R "http://localhost\|http://127.0.0.1" . \
            --include="*.kt" \
            --include="*.kts" \
            --include="*.xml"; then
            echo "Localhost HTTP reference still exists."
            exit 1
          fi

          echo "No localhost cleartext API calls found."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew clean :androidApp:assembleDebug --stacktrace
          else
            gradle clean :androidApp:assembleDebug --stacktrace
          fi

      - name: Upload fixed APK
        uses: actions/upload-artifact@v4
        with:
          name: releasehub-fixed-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Commit fixed project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix ReleaseHub GitHub API HTTPS client"
            git push
          fi