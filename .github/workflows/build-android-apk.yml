name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect project root
        id: project
        run: |
          set -e

          if [ -f "settings.gradle.kts" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "releasehub-mvp/settings.gradle.kts" ]; then
            echo "dir=releasehub-mvp" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find settings.gradle.kts in repo root or releasehub-mvp/"
            exit 1
          fi

          echo "Detected project dir: ${{ github.workspace }}/$(grep '^dir=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"

      - name: Bootstrap Gradle wrapper if missing
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          set -e

          mkdir -p build-logs

          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper missing. Generating wrapper..."
            gradle wrapper --gradle-version 8.11.1
          fi

          chmod +x gradlew

          {
            echo "===== JAVA VERSION ====="
            java -version
            echo
            echo "===== GRADLE VERSION ====="
            ./gradlew --version
            echo
            echo "===== PROJECT ROOT ====="
            pwd
            echo
            echo "===== FILE TREE (TOP LEVEL) ====="
            find . -maxdepth 3 -type f | sort
          } > build-logs/environment.log 2>&1

      - name: Build debug APK
        id: build
        continue-on-error: true
        working-directory: ${{ steps.project.outputs
