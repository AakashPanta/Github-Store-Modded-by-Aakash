name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect project root
        id: project
        shell: bash
        run: |
          set -e

          if [ -f "settings.gradle.kts" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "releasehub-mvp/settings.gradle.kts" ]; then
            echo "dir=releasehub-mvp" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find settings.gradle.kts in repo root or releasehub-mvp/"
            exit 1
          fi

          echo "Detected project dir: $(cat "$GITHUB_OUTPUT" | sed 's/^dir=//')"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -e
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.11.1'

      - name: Bootstrap Gradle wrapper if missing
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -e

          # Your generated source currently does not include gradlew/gradlew.bat.
          # This creates them and aligns the wrapper version with AGP 8.9.0 requirements.
          gradle wrapper --gradle-version 8.11.1

          chmod +x gradlew

          echo "Wrapper version:"
          ./gradlew --version

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          set -e
          ./gradlew :androidApp:assembleDebug --stacktrace --no-daemon

      - name: Show APK output
        shell: bash
        run: |
          set -e
          find "${{ steps.project.outputs.dir }}/androidApp/build/outputs" -type f | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: releasehub-debug-apk
          path: |
            ${{ steps.project.outputs.dir }}/androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
