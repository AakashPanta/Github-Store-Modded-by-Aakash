name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show repository root
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort | head -300

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Detect Gradle files
        id: detect
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            echo "use_wrapper=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_wrapper=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "./settings.gradle.kts" ] || [ -f "./settings.gradle" ]; then
            echo "has_settings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_settings=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -d "./androidApp" ]; then
            echo "has_android_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Make wrapper executable
        if: steps.detect.outputs.use_wrapper == 'true'
        run: chmod +x ./gradlew

      - name: Build debug APK and capture logs
        id: build
        shell: bash
        run: |
          mkdir -p build-logs

          {
            echo "=== ENV ==="
            java -version
            gradle -version || true
            echo
            echo "=== ROOT FILES ==="
            ls -la
            echo
            echo "=== DETECTED FILES ==="
            [ -f "./settings.gradle.kts" ] && echo "found settings.gradle.kts"
            [ -f "./settings.gradle" ] && echo "found settings.gradle"
            [ -f "./build.gradle.kts" ] && echo "found build.gradle.kts"
            [ -f "./build.gradle" ] && echo "found build.gradle"
            [ -d "./androidApp" ] && echo "found androidApp/"
            [ -f "./gradlew" ] && echo "found gradlew"
            echo
            echo "=== ANDROID APP TREE ==="
            find androidApp -maxdepth 4 -type f 2>/dev/null | sort || true
            echo
            echo "=== SETTINGS CONTENT ==="
            cat settings.gradle.kts 2>/dev/null || cat settings.gradle 2>/dev/null || true
            echo
          } | tee build-logs/environment.txt

          set -o pipefail

          if [ "${{ steps.detect.outputs.has_settings }}" != "true" ]; then
            echo "Missing settings.gradle(.kts) in repository root" | tee build-logs/error.txt
            exit 1
          fi

          if [ "${{ steps.detect.outputs.has_android_app }}" != "true" ]; then
            echo "Missing androidApp module in repository root" | tee build-logs/error.txt
            exit 1
          fi

          if [ "${{ steps.detect.outputs.use_wrapper }}" = "true" ]; then
            ./gradlew :androidApp:assembleDebug --stacktrace --info 2>&1 | tee build-logs/gradle-build.log
          else
            gradle :androidApp:assembleDebug --stacktrace --info 2>&1 | tee build-logs/gradle-build.log
          fi

      - name: Collect output metadata
        if: always()
        shell: bash
        run: |
          mkdir -p build-logs
          {
            echo "=== APK OUTPUTS ==="
            find androidApp/build/outputs -type f 2>/dev/null | sort || true
            echo
            echo "=== BUILD DIRS ==="
            find . -maxdepth 3 -type d \( -name build -o -name outputs \) 2>/dev/null | sort || true
          } | tee build-logs/artifacts.txt

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-logs/**
          if-no-files-found: warn

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug-apk
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
