name: Build APK Final Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Gradle if wrapper missing
        shell: bash
        run: |
          set -e
          if [ ! -f "./gradlew" ]; then
            echo "No Gradle wrapper found. Installing Gradle..."
            sudo apt-get update
            sudo apt-get install -y gradle
          else
            chmod +x ./gradlew
          fi

      - name: Build APK
        shell: bash
        run: |
          set -e

          if [ -f "./gradlew" ]; then
            ./gradlew clean :androidApp:assembleDebug --stacktrace
          else
            gradle clean :androidApp:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk