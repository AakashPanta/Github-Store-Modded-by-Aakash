name: Fix Cleartext Localhost And Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    name: Fix localhost cleartext and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect Android app module
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "androidApp/build.gradle.kts" ] || [ -f "androidApp/build.gradle" ]; then
            echo "module=androidApp" >> "$GITHUB_OUTPUT"
            echo "task=:androidApp:assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=androidApp/build/outputs/apk/debug/*.apk" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f "app/build.gradle.kts" ] || [ -f "app/build.gradle" ]; then
            echo "module=app" >> "$GITHUB_OUTPUT"
            echo "task=:app:assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/debug/*.apk" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Android app module found. Expected androidApp or app."
          find . -maxdepth 3 -name "build.gradle.kts" -o -name "build.gradle"
          exit 1

      - name: Fix cleartext localhost network security error
        shell: bash
        run: |
          set -euo pipefail

          MODULE="${{ steps.detect.outputs.module }}"
          MANIFEST="$MODULE/src/main/AndroidManifest.xml"
          RES_XML_DIR="$MODULE/src/main/res/xml"
          NETWORK_SECURITY_FILE="$RES_XML_DIR/network_security_config.xml"

          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found at $MANIFEST"
            exit 1
          fi

          mkdir -p "$RES_XML_DIR"

          cat > "$NETWORK_SECURITY_FILE" <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <domain-config cleartextTrafficPermitted="true">
        <domain includeSubdomains="true">localhost</domain>
        <domain includeSubdomains="true">127.0.0.1</domain>
        <domain includeSubdomains="true">10.0.2.2</domain>
        <domain includeSubdomains="true">0.0.0.0</domain>
    </domain-config>
</network-security-config>
EOF

          python3 <<'PY'
from pathlib import Path
import re
import os

module = os.environ.get("MODULE_NAME")
manifest_path = Path(f"{module}/src/main/AndroidManifest.xml")

text = manifest_path.read_text(encoding="utf-8")

match = re.search(r"<application\b[^>]*>", text, flags=re.DOTALL)
if not match:
    raise SystemExit("No <application> tag found in AndroidManifest.xml")

tag = match.group(0)

def set_android_attr(tag_text: str, name: str, value: str) -> str:
    pattern = rf'\s{name}="[^"]*"'
    replacement = f' {name}="{value}"'
    if re.search(pattern, tag_text):
        return re.sub(pattern, replacement, tag_text, count=1)
    return tag_text[:-1].rstrip() + replacement + ">"

tag = set_android_attr(
    tag,
    "android:networkSecurityConfig",
    "@xml/network_security_config"
)

tag = set_android_attr(
    tag,
    "android:usesCleartextTraffic",
    "true"
)

text = text[:match.start()] + tag + text[match.end():]
manifest_path.write_text(text, encoding="utf-8")
PY
        env:
          MODULE_NAME: ${{ steps.detect.outputs.module }}

      - name: Show fixed files
        shell: bash
        run: |
          set -euo pipefail

          MODULE="${{ steps.detect.outputs.module }}"

          echo "===== AndroidManifest.xml ====="
          sed -n '1,160p' "$MODULE/src/main/AndroidManifest.xml"

          echo ""
          echo "===== network_security_config.xml ====="
          sed -n '1,160p' "$MODULE/src/main/res/xml/network_security_config.xml"

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TASK="${{ steps.detect.outputs.task }}"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean "$BUILD_TASK" --stacktrace
          else
            echo "gradlew not found. Using system Gradle."
            gradle clean "$BUILD_TASK" --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: releasehub-debug-apk
          path: ${{ steps.detect.outputs.apk_path }}
          if-no-files-found: error

      - name: Commit fixed project
        shell: bash
        run: |
          set -euo pipefail

          MODULE="${{ steps.detect.outputs.module }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$MODULE/src/main/AndroidManifest.xml" "$MODULE/src/main/res/xml/network_security_config.xml"

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix localhost cleartext network security config"
            git push
          fi