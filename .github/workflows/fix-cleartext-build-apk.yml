name: Fix Cleartext Localhost And Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix localhost cleartext
        shell: bash
        run: |
          set -e

          MODULE="androidApp"

          if [ ! -f "$MODULE/src/main/AndroidManifest.xml" ]; then
            MODULE="app"
          fi

          MANIFEST="$MODULE/src/main/AndroidManifest.xml"
          RES_XML="$MODULE/src/main/res/xml"
          CONFIG="$RES_XML/network_security_config.xml"

          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found"
            exit 1
          fi

          mkdir -p "$RES_XML"

          cat > "$CONFIG" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">localhost</domain>
                  <domain includeSubdomains="true">127.0.0.1</domain>
                  <domain includeSubdomains="true">10.0.2.2</domain>
                  <domain includeSubdomains="true">0.0.0.0</domain>
              </domain-config>
          </network-security-config>
          EOF

          python3 <<PY
          from pathlib import Path
          import re

          manifest = Path("$MANIFEST")
          text = manifest.read_text()

          app = re.search(r"<application\\b[^>]*>", text, re.S)
          if not app:
              raise SystemExit("No application tag found")

          tag = app.group(0)

          def put_attr(tag, key, value):
              if key in tag:
                  return re.sub(rf'{key}="[^"]*"', f'{key}="{value}"', tag)
              return tag.replace("<application", f'<application {key}="{value}"', 1)

          tag = put_attr(tag, "android:usesCleartextTraffic", "true")
          tag = put_attr(tag, "android:networkSecurityConfig", "@xml/network_security_config")

          text = text[:app.start()] + tag + text[app.end():]
          manifest.write_text(text)
          PY

      - name: Build APK
        shell: bash
        run: |
          set -e

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean :androidApp:assembleDebug --stacktrace || ./gradlew clean :app:assembleDebug --stacktrace
          else
            gradle clean :androidApp:assembleDebug --stacktrace || gradle clean :app:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fixed-debug-apk
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Commit fixes
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "Fix cleartext localhost network security"
          git push || true