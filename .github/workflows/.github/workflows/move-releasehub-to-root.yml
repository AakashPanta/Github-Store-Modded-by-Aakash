name: Move releasehub-mvp to repo root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source folder exists
        run: |
          set -e
          if [ ! -d "releasehub-mvp" ]; then
            echo "Folder releasehub-mvp not found."
            exit 1
          fi

      - name: Show files before move
        run: |
          echo "===== ROOT BEFORE ====="
          ls -la
          echo "===== releasehub-mvp BEFORE ====="
          ls -la releasehub-mvp

      - name: Move all files from releasehub-mvp to repo root
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y rsync

          rsync -av --remove-source-files \
            --exclude=".git" \
            releasehub-mvp/ ./

          find releasehub-mvp -type d -empty -delete || true

          if [ -d "releasehub-mvp" ] && [ -z "$(ls -A releasehub-mvp 2>/dev/null)" ]; then
            rmdir releasehub-mvp || true
          fi

      - name: Show files after move
        run: |
          echo "===== ROOT AFTER ====="
          ls -la

      - name: Commit and push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Move releasehub-mvp contents to repository root"
          git push
