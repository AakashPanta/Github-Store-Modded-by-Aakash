name: Fix Compose + Kotlin Final Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix Kotlin + Compose versions (SAFE)
        run: |
          set -e

          # Force Kotlin 2.0.20 everywhere
          find . -name "*.gradle.kts" -type f -exec sed -i 's/1\.9\.[0-9]*/2.0.20/g' {} \;

          # Force Compose plugin compatible
          find . -name "*.gradle.kts" -type f -exec sed -i 's/org.jetbrains.compose.*1\..*/org.jetbrains.compose\") version \"1.7.0\"/g' {} \;

      - name: Fix composeApp (CRITICAL)
        run: |
          set -e

          FILE="composeApp/build.gradle.kts"

          if [ -f "$FILE" ]; then

            # Ensure androidTarget exists
            if ! grep -q "androidTarget()" "$FILE"; then
              sed -i '/kotlin {/a\    androidTarget()' "$FILE"
            fi

          fi

      - name: Fix settings.gradle.kts (plugin versions)
        run: |
          set -e

          FILE="settings.gradle.kts"

          if [ -f "$FILE" ]; then

            sed -i 's/kotlin(\"multiplatform\").*/kotlin(\"multiplatform\") version \"2.0.20\"/g' "$FILE"
            sed -i 's/kotlin(\"android\").*/kotlin(\"android\") version \"2.0.20\"/g' "$FILE"

          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x ./gradlew || true
          ./gradlew clean :androidApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fixed-apk
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Fix Compose + Kotlin compatibility" || echo "No changes"
          git push